<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIRAL TRAFFIC ENGINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    body { font-family: 'Orbitron', sans-serif; }
    .neon-text { text-shadow: 0 0 20px #22d3ee, 0 0 40px #22d3ee, 0 0 60px #ec4899; }
    .glass { background: rgba(9,9,11,0.92); backdrop-filter: blur(20px); }
  </style>
</head>
<body class="bg-zinc-950 text-cyan-400 overflow-hidden">

<canvas id="particles" style="position:fixed;top:0;left:0;z-index:-1;pointer-events:none;"></canvas>

<nav class="fixed top-0 w-full z-50 glass border-b border-cyan-500/30 py-5">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-bolt text-5xl text-pink-500"></i>
      <span class="text-5xl font-black neon-text">VIRAL TRAFFIC ENGINE</span>
    </div>
    <button onclick="showAdminModal()" class="px-10 py-4 bg-gradient-to-r from-pink-600 to-cyan-600 rounded-3xl font-bold text-xl flex items-center gap-3">ADMIN PANEL</button>
  </div>
</nav>

<div class="pt-32 max-w-5xl mx-auto px-6 text-center">
  <h1 class="text-8xl font-black neon-text">TRAFFIC IS EXPLODING</h1>

  <!-- Viral Link -->
  <div class="glass rounded-3xl p-12 mt-20">
    <h2 class="text-4xl font-bold mb-6">YOUR VIRAL REFERRAL LINK</h2>
    <div class="flex gap-4 max-w-2xl mx-auto">
      <input id="refLink" readonly class="flex-1 bg-zinc-900 border border-cyan-400 rounded-3xl px-8 py-8 text-2xl font-mono text-white">
      <button onclick="copyLink()" id="copyBtn" class="px-16 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-3xl text-2xl">COPY</button>
    </div>
    <div id="linkStatus" class="mt-6 text-emerald-400 text-xl">✅ Instant link • Ready to share</div>
  </div>

  <!-- Leaderboard -->
  <div class="glass rounded-3xl p-12 mt-12">
    <h2 class="text-4xl font-bold mb-6">TOP REFERRAL LEADERS</h2>
    <div id="leaderboard" class="text-center py-8">Loading leaderboard...</div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
  <div class="glass max-w-lg w-full mx-6 rounded-3xl p-12">
    <div class="flex justify-between mb-8">
      <h2 class="text-5xl font-black">ADMIN PANEL</h2>
      <button onclick="hideAdminModal()" class="text-6xl text-gray-400 hover:text-white">×</button>
    </div>
    <div id="passwordScreen">
      <input id="adminPass" type="password" placeholder="viral2026$" class="w-full bg-zinc-900 border border-pink-500 rounded-3xl px-8 py-8 text-2xl mb-8">
      <button onclick="checkAdminPassword()" class="w-full py-8 bg-gradient-to-r from-pink-600 to-purple-600 rounded-3xl text-2xl font-bold">UNLOCK</button>
    </div>
    <div id="adminDashboard" class="hidden space-y-8">
      <input id="newTargetUrl" placeholder="https://your-site.com" class="w-full bg-zinc-900 border border-cyan-500 rounded-3xl px-8 py-8 text-xl">
      <button onclick="updateTargetWebsite()" class="w-full py-8 bg-emerald-500 text-black font-bold rounded-3xl text-2xl">SAVE TARGET URL</button>
      <button onclick="resetAllStats()" class="w-full py-8 bg-red-600 text-white font-bold rounded-3xl text-2xl">RESET ALL STATS</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const supabase = createClient('https://hogrcnwnctzicicxcavv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ3JjbnduY3R6aWNpY3hjYXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzYwNTQsImV4cCI6MjA4ODYxMjA1NH0.mUBKJ6-d1QCt3LOYalekGc1n-zOgjG7GeseoBWSAQKQ')
  window.supabase = supabase

  let myCode = localStorage.getItem('myReferralCode')
  if (!myCode) {
    myCode = 'VIRAL-' + Math.random().toString(36).substring(2,10).toUpperCase()
    localStorage.setItem('myReferralCode', myCode)
  }

  function showAdminModal() { document.getElementById('adminModal').classList.remove('hidden') }
  function hideAdminModal() { document.getElementById('adminModal').classList.add('hidden') }
  function checkAdminPassword() {
    if (document.getElementById('adminPass').value === 'viral2026$') {
      document.getElementById('passwordScreen').classList.add('hidden')
      document.getElementById('adminDashboard').classList.remove('hidden')
    } else alert('Wrong password')
  }
  function updateTargetWebsite() {
    const u = document.getElementById('newTargetUrl').value.trim()
    if (u) alert('Saved: ' + u)
  }
  function resetAllStats() {
    if (confirm('Reset all?')) alert('Stats reset')
  }
  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('refLink').value)
    const btn = document.getElementById('copyBtn')
    const old = btn.textContent
    btn.textContent = 'COPIED ✓'
    confetti({particleCount:300})
    setTimeout(() => btn.textContent = old, 1500)
  }

  function loadMyLink() {
    document.getElementById('refLink').value = location.origin + '/?ref=' + myCode
  }

  async function loadLeaderboard() {
    try {
      const { data } = await supabase.from('referrers').select('*').order('visits', {ascending: false}).limit(10)
      document.getElementById('leaderboard').innerHTML = data && data.length ? data.map((r,i) => `<div class="flex justify-between py-3"><span>#${i+1} ${r.code}</span><span>${r.visits} visits</span></div>`).join('') : 'No data yet'
    } catch(e) {}
  }

  // FORCE ALL FUNCTIONS GLOBAL
  window.showAdminModal = showAdminModal
  window.hideAdminModal = hideAdminModal
  window.checkAdminPassword = checkAdminPassword
  window.updateTargetWebsite = updateTargetWebsite
  window.resetAllStats = resetAllStats
  window.copyLink = copyLink
  window.loadMyLink = loadMyLink
  window.loadLeaderboard = loadLeaderboard

  window.onload = () => {
    loadMyLink()
    loadLeaderboard()
  }
</script>
</body>
</html>
