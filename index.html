<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIRAL TRAFFIC ENGINE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
body { background:#09090b; color:#67e8f9; font-family:sans-serif; text-align:center; padding-top:80px; }
button { margin:10px; padding:15px 30px; font-size:18px; border-radius:10px; }
</style>
</head>
<body>

<h1 style="font-size:50px">VIRAL TRAFFIC ENGINE</h1>
<h2 style="font-size:30px">TRAFFIC IS EXPLODING</h2>

<input id="refLink" style="width:80%;max-width:600px;padding:20px;font-size:20px;margin:20px" readonly><br>
<button onclick="copyLink()">COPY LINK</button>

<div style="margin-top:40px">
<button onclick="shareTwitter()">Twitter</button>
<button onclick="shareFacebook()">Facebook</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<button onclick="shareTelegram()">Telegram</button>
<button onclick="shareLinkedIn()">LinkedIn</button>
<button onclick="shareReddit()">Reddit</button>
<button onclick="shareEmail()">Email</button>
<button onclick="shareDiscord()">Discord</button>
<button onclick="sharePinterest()">Pinterest</button>
<button onclick="shareTumblr()">Tumblr</button>
<button onclick="shareSMS()">SMS</button>
</div>

<button onclick="showAdminModal()" style="margin-top:50px;background:red;color:white;padding:15px 40px;font-size:20px">ADMIN PANEL</button>

<div id="adminModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:9999">
<div style="background:#111;margin:100px auto;width:90%;max-width:500px;padding:30px;border-radius:15px">
<h2>ADMIN PANEL</h2>
<input id="adminPass" type="password" placeholder="viral2026$" style="width:100%;padding:15px;margin:20px 0"><br>
<button onclick="checkAdminPassword()" style="width:100%;padding:15px">UNLOCK</button>
</div>
</div>

<script>
document.getElementById('refLink').value = location.origin + '/?ref=VIRAL-' + Math.random().toString(36).substring(2,10).toUpperCase();

function copyLink(){
  navigator.clipboard.writeText(document.getElementById('refLink').value);
  confetti({particleCount:200});
  alert('Copied!');
}

function showAdminModal(){document.getElementById('adminModal').style.display='block'}
function hideAdminModal(){document.getElementById('adminModal').style.display='none'}
function checkAdminPassword(){
  if(document.getElementById('adminPass').value === 'viral2026$'){
    hideAdminModal();
    alert('Admin panel unlocked!');
  } else alert('Wrong password');
}

function shareTwitter(){window.open('https://twitter.com/intent/tweet?text=Join me on Viral Traffic Engine&url=' + encodeURIComponent(document.getElementById('refLink').value))}
function shareFacebook(){window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(document.getElementById('refLink').value))}
function shareWhatsApp(){window.open('https://wa.me/?text=' + encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value))}
function shareTelegram(){window.open('https://t.me/share/url?url=' + encodeURIComponent(document.getElementById('refLink').value))}
function shareLinkedIn(){window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(document.getElementById('refLink').value))}
function shareReddit(){window.open('https://reddit.com/submit?url=' + encodeURIComponent(document.getElementById('refLink').value) + '&title=Join me on Viral Traffic Engine')}
function shareEmail(){window.location.href = 'mailto:?subject=Check this out&body=' + encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value)}
function shareDiscord(){window.open('https://discord.com/channels/@me?text=' + encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value))}
function sharePinterest(){window.open('https://pinterest.com/pin/create/button/?url=' + encodeURIComponent(document.getElementById('refLink').value))}
function shareTumblr(){window.open('https://www.tumblr.com/share/link?url=' + encodeURIComponent(document.getElementById('refLink').value))}
function shareSMS(){window.location.href = 'sms:?body=' + encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value)}
</script>
</body>
</html>
