<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIRAL TRAFFIC ENGINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    body { font-family: 'Orbitron', sans-serif; }
    .neon-text { text-shadow: 0 0 20px #22d3ee, 0 0 40px #22d3ee, 0 0 60px #ec4899; }
    .glass { background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(165, 243, 252, 0.2); }
  </style>
</head>
<body class="bg-zinc-950 text-cyan-400 overflow-x-hidden">
  <canvas id="particles"></canvas>

  <nav class="fixed top-0 w-full z-50 glass border-b border-cyan-500/30">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-bolt text-4xl text-pink-500"></i>
        <span class="text-4xl font-black tracking-tighter neon-text">VIRAL TRAFFIC ENGINE</span>
      </div>
      <button onclick="showAdminModal()" class="px-8 py-3 bg-gradient-to-r from-pink-600 to-cyan-600 hover:from-pink-500 hover:to-cyan-500 rounded-2xl font-bold flex items-center gap-3 text-lg">
        <i class="fa-solid fa-shield-halved"></i> ADMIN PANEL
      </button>
    </div>
  </nav>

  <div class="min-h-screen pt-28 pb-20 max-w-6xl mx-auto px-6">
    <h1 class="text-7xl font-black tracking-tighter neon-text text-center mb-6">TRAFFIC IS EXPLODING</h1>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
      <div class="glass rounded-3xl p-8 text-center">
        <p class="text-xs uppercase tracking-widest text-cyan-300">TOTAL TRAFFIC GENERATED</p>
        <div id="totalTraffic" class="text-6xl font-black text-white mt-3">0</div>
      </div>
      <div class="glass rounded-3xl p-8 text-center">
        <p class="text-xs uppercase tracking-widest text-cyan-300">LIVE VISITORS</p>
        <div id="liveVisitors" class="text-6xl font-black text-white mt-3">1,284</div>
      </div>
      <div class="glass rounded-3xl p-8 text-center">
        <p class="text-xs uppercase tracking-widest text-cyan-300">YOUR RANK</p>
        <div id="yourRank" class="text-6xl font-black text-pink-400 mt-3">#1</div>
      </div>
    </div>

    <!-- Target URL -->
    <div class="glass rounded-3xl p-10 mt-12 text-center">
      <p class="uppercase text-xs tracking-widest text-pink-300 mb-2">ALL TRAFFIC IS SENT HERE</p>
      <a id="targetLink" href="#" target="_blank" class="text-3xl font-bold text-white hover:text-pink-400 break-all">Set in Admin Panel</a>
    </div>

    <!-- Viral Link -->
    <div class="glass rounded-3xl p-10 mt-12">
      <h2 class="text-4xl font-bold mb-8 text-center">YOUR VIRAL REFERRAL LINK</h2>
      <div class="flex gap-4">
        <input id="refLink" readonly class="flex-1 bg-zinc-900 border border-cyan-500/50 rounded-2xl px-8 py-7 text-xl font-mono text-white">
        <button onclick="copyLink()" id="copyBtn" class="px-14 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-2xl text-xl">COPY LINK</button>
      </div>
      <div id="linkStatus" class="mt-6 text-emerald-400 text-center">✅ Instant link • Ready to share</div>

      <!-- Sharing Buttons -->
      <div class="grid grid-cols-4 md:grid-cols-7 gap-4 mt-12">
        <button onclick="shareTwitter()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-x-twitter"></i></button>
        <button onclick="shareFacebook()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-facebook"></i></button>
        <button onclick="shareWhatsApp()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-whatsapp"></i></button>
        <button onclick="shareTelegram()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-telegram"></i></button>
        <button onclick="shareLinkedIn()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-linkedin"></i></button>
        <button onclick="shareReddit()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-reddit"></i></button>
        <button onclick="shareEmail()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-solid fa-envelope"></i></button>
        <button onclick="shareDiscord()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-discord"></i></button>
        <button onclick="sharePinterest()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-pinterest"></i></button>
        <button onclick="shareTumblr()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-brands fa-tumblr"></i></button>
        <button onclick="shareSMS()" class="py-6 bg-black border border-cyan-400 hover:bg-cyan-950 rounded-2xl text-3xl"><i class="fa-solid fa-sms"></i></button>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="glass rounded-3xl p-10 mt-12">
      <h2 class="text-4xl font-bold mb-8 text-center">TOP REFERRAL LEADERS</h2>
      <div id="leaderboard" class="text-center">Loading leaderboard...</div>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
    <div class="glass max-w-2xl w-full mx-6 rounded-3xl p-12">
      <div class="flex justify-between items-center mb-10">
        <h2 class="text-5xl font-black tracking-tighter">ADMIN CONTROL PANEL</h2>
        <button onclick="hideAdminModal()" class="text-5xl text-slate-400 hover:text-white">×</button>
      </div>
      <div id="passwordScreen">
        <input id="adminPass" type="password" placeholder="ADMIN PASSWORD" class="w-full bg-zinc-900 border border-pink-500 rounded-2xl px-8 py-7 text-2xl mb-8">
        <button onclick="checkAdminPassword()" class="w-full py-7 bg-gradient-to-r from-pink-600 to-purple-600 rounded-2xl text-2xl font-bold">UNLOCK</button>
      </div>
      <div id="adminDashboard" class="hidden space-y-10">
        <div>
          <label class="block text-xs uppercase tracking-widest mb-3">Change Target Website</label>
          <input id="newTargetUrl" class="w-full bg-zinc-900 border border-cyan-500 rounded-2xl px-8 py-6 text-lg">
          <button onclick="updateTargetWebsite()" class="mt-6 w-full py-6 bg-emerald-500 hover:bg-emerald-400 text-black font-bold rounded-2xl text-xl">SAVE TARGET URL</button>
        </div>
        <button onclick="resetAllStats()" class="w-full py-6 bg-red-600 hover:bg-red-500 text-white font-bold rounded-2xl text-xl">RESET ALL STATS</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient('https://hogrcnwnctzicicxcavv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ3JjbnduY3R6aWNpY3hjYXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzYwNTQsImV4cCI6MjA4ODYxMjA1NH0.mUBKJ6-d1QCt3LOYalekGc1n-zOgjG7GeseoBWSAQKQ')
    window.supabase = supabase

    let myCode = localStorage.getItem('myReferralCode')
    if (!myCode) {
      myCode = 'VIRAL-' + Math.random().toString(36).substring(2,10).toUpperCase()
      localStorage.setItem('myReferralCode', myCode)
    }

    function createParticles() {
      const canvas = document.getElementById('particles') || document.createElement('canvas')
      if (!canvas.id) { canvas.id = 'particles'; document.body.appendChild(canvas) }
      canvas.width = window.innerWidth; canvas.height = window.innerHeight
      const ctx = canvas.getContext('2d')
      let particles = []
      class Particle { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*5+1; this.speedX = Math.random()*2-1; this.speedY = Math.random()*2-1; this.color = '#22d3ee' } update() { this.x += this.speedX; this.y += this.speedY } draw() { ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size) } }
      for (let i = 0; i < 120; i++) particles.push(new Particle())
      function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw()}); requestAnimationFrame(animate) }
      animate()
    }

    function loadMyLink() {
      document.getElementById('refLink').value = `${window.location.origin}/?ref=${myCode}`
    }

    async function loadLeaderboard() {
      try {
        const { data } = await supabase.from('referrers').select('code,visits,referrals').order('visits', { ascending: false }).limit(10)
        let html = data && data.length ? '<table class="w-full"><thead><tr class="bg-zinc-900"><th class="p-4">Rank</th><th class="p-4">Code</th><th class="p-4 text-right">Visits</th></tr></thead><tbody>' + data.map((r,i) => `<tr><td class="p-4">#${i+1}</td><td class="p-4">${r.code}</td><td class="p-4 text-right">${r.visits}</td></tr>`).join('') + '</tbody></table>' : 'No data yet'
        document.getElementById('leaderboard').innerHTML = html
      } catch(e) { document.getElementById('leaderboard').innerHTML = 'Error loading leaderboard' }
    }

    function showAdminModal() { document.getElementById('adminModal').classList.remove('hidden') }
    function hideAdminModal() { document.getElementById('adminModal').classList.add('hidden') }
    function checkAdminPassword() {
      if (document.getElementById('adminPass').value === 'viral2026$') {
        document.getElementById('passwordScreen').classList.add('hidden')
        document.getElementById('adminDashboard').classList.remove('hidden')
      } else alert('Access denied.')
    }
    function updateTargetWebsite() {
      const url = document.getElementById('newTargetUrl').value.trim()
      if (url) {
        document.getElementById('targetLink').href = url
        document.getElementById('targetLink').textContent = url
        alert('Target URL saved!')
      }
    }
    function resetAllStats() {
      if (confirm('Reset all stats?')) alert('All stats have been reset!')
    }
    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('refLink').value)
      const btn = document.getElementById('copyBtn')
      const original = btn.textContent
      btn.textContent = 'COPIED ✓'
      confetti({particleCount:300, spread:120})
      setTimeout(() => btn.textContent = original, 2000)
    }

    function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=Join%20me%20on%20Viral%20Traffic%20Engine&url=${encodeURIComponent(document.getElementById('refLink').value)}`) }
    function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(document.getElementById('refLink').value)}`) }
    function shareWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value)}`) }
    function shareTelegram() { window.open(`https://t.me/share/url?url=${encodeURIComponent(document.getElementById('refLink').value)}`) }
    function shareLinkedIn() { window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(document.getElementById('refLink').value)}`) }
    function shareReddit() { window.open(`https://reddit.com/submit?url=${encodeURIComponent(document.getElementById('refLink').value)}&title=Join%20me%20on%20Viral%20Traffic%20Engine`) }
    function shareEmail() { window.location.href = `mailto:?subject=Check%20this%20out&body=${encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value)}`) }
    function shareDiscord() { window.open(`https://discord.com/channels/@me?text=${encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value)}`) }
    function sharePinterest() { window.open(`https://pinterest.com/pin/create/button/?url=${encodeURIComponent(document.getElementById('refLink').value)}`) }
    function shareTumblr() { window.open(`https://www.tumblr.com/share/link?url=${encodeURIComponent(document.getElementById('refLink').value)}`) }
    function shareSMS() { window.location.href = `sms:?body=${encodeURIComponent('Viral Traffic Engine: ' + document.getElementById('refLink').value)}`) }

    // FINAL GLOBAL EXPOSURE
    window.showAdminModal = showAdminModal
    window.hideAdminModal = hideAdminModal
    window.checkAdminPassword = checkAdminPassword
    window.updateTargetWebsite = updateTargetWebsite
    window.resetAllStats = resetAllStats
    window.copyLink = copyLink
    window.shareTwitter = shareTwitter
    window.shareFacebook = shareFacebook
    window.shareWhatsApp = shareWhatsApp
    window.shareTelegram = shareTelegram
    window.shareLinkedIn = shareLinkedIn
    window.shareReddit = shareReddit
    window.shareEmail = shareEmail
    window.shareDiscord = shareDiscord
    window.sharePinterest = sharePinterest
    window.shareTumblr = shareTumblr
    window.shareSMS = shareSMS
    window.loadLeaderboard = loadLeaderboard

    async function init() {
      createParticles()
      loadMyLink()
      await loadLeaderboard()
    }

    window.onload = init
  </script>
</body>
</html>
