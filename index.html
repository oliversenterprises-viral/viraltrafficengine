<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIRAL TRAFFIC ENGINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    body { font-family: 'Orbitron', sans-serif; }
    .neon-text { text-shadow: 0 0 20px #22d3ee, 0 0 40px #22d3ee, 0 0 60px #ec4899; }
    .glass { background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(20px); }
    canvas#particles { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
  </style>
</head>
<body class="bg-zinc-950 text-cyan-400 overflow-x-hidden">
  <canvas id="particles"></canvas>

  <nav class="fixed top-0 w-full z-50 glass border-b border-cyan-500/30">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-bolt text-4xl text-pink-500"></i>
        <span class="text-4xl font-black tracking-tighter neon-text">VIRAL TRAFFIC ENGINE</span>
      </div>
      <button onclick="showAdminModal()" class="px-8 py-3 bg-gradient-to-r from-pink-600 to-cyan-600 hover:from-pink-500 hover:to-cyan-500 rounded-2xl font-bold flex items-center gap-3 text-lg">
        <i class="fa-solid fa-shield-halved"></i> ADMIN PANEL
      </button>
    </div>
  </nav>

  <div class="min-h-screen pt-28 pb-20">
    <div class="max-w-6xl mx-auto text-center px-6">
      <h1 class="text-8xl font-black tracking-tighter neon-text mb-4">TRAFFIC IS EXPLODING</h1>
      <p class="text-3xl mt-4 text-slate-300">Share your link • Watch real visitors flood in</p>
    </div>

    <div class="max-w-4xl mx-auto mt-16 px-6">
      <div class="glass rounded-3xl p-10">
        <h2 class="text-4xl font-bold mb-8 text-center">YOUR VIRAL REFERRAL LINK</h2>
        <div class="flex gap-4">
          <input id="refLink" readonly class="flex-1 bg-zinc-900 border border-cyan-500/50 rounded-2xl px-8 py-7 text-xl font-mono text-white">
          <button onclick="copyLink()" id="copyBtn" class="px-12 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-2xl text-xl">COPY LINK</button>
        </div>
        <div id="linkStatus" class="mt-4 text-emerald-400 text-sm font-medium">✅ Instant link • Ready to share</div>
      </div>
    </div>

    <div class="max-w-4xl mx-auto mt-20 px-6">
      <h2 class="text-4xl font-bold mb-8 text-center">TOP REFERRAL LEADERS</h2>
      <div id="leaderboard" class="glass rounded-3xl overflow-hidden p-8 text-center">Loading leaderboard...</div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[9999]">
    <div class="glass max-w-2xl w-full mx-6 rounded-3xl p-12">
      <div class="flex justify-between items-center mb-10">
        <h2 class="text-5xl font-black tracking-tighter">ADMIN CONTROL PANEL</h2>
        <button onclick="hideAdminModal()" class="text-5xl text-slate-400 hover:text-white">×</button>
      </div>
      <div id="passwordScreen">
        <input id="adminPass" type="password" placeholder="ADMIN PASSWORD" class="w-full bg-zinc-900 border border-pink-500 rounded-2xl px-8 py-7 text-2xl mb-8">
        <button onclick="checkAdminPassword()" class="w-full py-7 bg-gradient-to-r from-pink-600 to-purple-600 rounded-2xl text-2xl font-bold">UNLOCK</button>
      </div>
      <div id="adminDashboard" class="hidden space-y-10">
        <div>
          <label class="block text-xs uppercase tracking-widest mb-3">Change Target Website</label>
          <input id="newTargetUrl" class="w-full bg-zinc-900 border border-cyan-500 rounded-2xl px-8 py-6 text-lg">
          <button onclick="updateTargetWebsite()" class="mt-6 w-full py-6 bg-emerald-500 hover:bg-emerald-400 text-black font-bold rounded-2xl text-xl">SAVE TARGET URL</button>
        </div>
        <button onclick="resetAllStats()" class="w-full py-6 bg-red-600 hover:bg-red-500 text-white font-bold rounded-2xl text-xl">RESET ALL STATS</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://hogrcnwnctzicicxcavv.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ3JjbnduY3R6aWNpY3hjYXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzYwNTQsImV4cCI6MjA4ODYxMjA1NH0.mUBKJ6-d1QCt3LOYalekGc1n-zOgjG7GeseoBWSAQKQ'
    const ADMIN_PASSWORD = 'viral2026$'
    const REFERRAL_PREFIX = 'VIRAL-'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    window.supabase = supabase

    let myCode = localStorage.getItem('myReferralCode')
    if (!myCode) {
      myCode = REFERRAL_PREFIX + Math.random().toString(36).substring(2,10).toUpperCase()
      localStorage.setItem('myReferralCode', myCode)
    }

    function createParticles() {
      const canvas = document.getElementById('particles')
      canvas.width = window.innerWidth; canvas.height = window.innerHeight
      const ctx = canvas.getContext('2d')
      let particles = []
      class Particle {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*5+1; this.speedX = Math.random()*2-1; this.speedY = Math.random()*2-1; this.color = Math.random()>0.5?'#22d3ee':'#ec4899' }
        update() { this.x += this.speedX; this.y += this.speedY }
        draw() { ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size) }
      }
      for (let i = 0; i < 120; i++) particles.push(new Particle())
      function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw()}); requestAnimationFrame(animate) }
      animate()
    }

    function loadMyLink() {
      document.getElementById('refLink').value = `${window.location.origin}/?ref=${myCode}`
      document.getElementById('linkStatus').innerHTML = `✅ Instant link • Prefix: ${REFERRAL_PREFIX}`
    }

    async function loadLeaderboard() {
      try {
        const { data } = await supabase.from('referrers').select('code, visits, referrals').order('visits', { ascending: false }).limit(10)
        if (!data || data.length === 0) {
          document.getElementById('leaderboard').innerHTML = `<p class="p-8 text-yellow-400">No referrers yet — start sharing!</p>`
          return
        }
        let html = `<table class="w-full"><thead><tr class="bg-zinc-900"><th class="p-8 text-left">RANK</th><th class="p-8 text-left">REFERRER</th><th class="p-8 text-right">VISITS</th><th class="p-8 text-right">CONVERSIONS</th></tr></thead><tbody class="divide-y divide-cyan-900">`
        data.forEach((row,i)=>{ html += `<tr><td class="p-8 font-black text-2xl">#${i+1}</td><td class="p-8 font-mono">${row.code}</td><td class="p-8 text-right font-black text-emerald-400">${row.visits.toLocaleString()}</td><td class="p-8 text-right">${row.referrals}</td></tr>` })
        html += `</tbody></table>`
        document.getElementById('leaderboard').innerHTML = html
      } catch(e) {}
    }

    function showAdminModal() { 
      document.getElementById('adminModal').classList.remove('hidden'); 
      document.getElementById('passwordScreen').classList.remove('hidden'); 
      document.getElementById('adminDashboard').classList.add('hidden') 
    }
    function hideAdminModal() { document.getElementById('adminModal').classList.add('hidden') }
    function checkAdminPassword() {
      if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
        document.getElementById('passwordScreen').classList.add('hidden')
        document.getElementById('adminDashboard').classList.remove('hidden')
      } else alert('Access denied.')
    }
    function updateTargetWebsite() {
      const url = document.getElementById('newTargetUrl').value.trim()
      if (!url) return
      document.getElementById('targetLink').href = url
      document.getElementById('targetLink').textContent = url
      alert('Target URL saved!')
    }

    // CRITICAL: All functions exposed globally for Netlify/Cloudflare
    window.showAdminModal = showAdminModal
    window.hideAdminModal = hideAdminModal
    window.checkAdminPassword = checkAdminPassword
    window.updateTargetWebsite = updateTargetWebsite
    window.loadLeaderboard = loadLeaderboard

    async function init() {
      createParticles()
      loadMyLink()
      await loadLeaderboard()
    }

    window.onload = init
  </script>
</body>
</html>
