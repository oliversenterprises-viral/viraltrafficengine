<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIRAL TRAFFIC ENGINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    body { font-family: 'Orbitron', sans-serif; }
    .neon-text { text-shadow: 0 0 20px #22d3ee, 0 0 40px #22d3ee, 0 0 60px #ec4899; }
    .glass { background: rgba(9,9,11,0.9); backdrop-filter: blur(20px); }
  </style>
</head>
<body class="bg-zinc-950 text-cyan-400">

  <nav class="fixed top-0 w-full z-50 glass border-b border-cyan-500/30 py-4">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-bolt text-5xl text-pink-500"></i>
        <span class="text-4xl font-black neon-text">VIRAL TRAFFIC ENGINE</span>
      </div>
      <button onclick="showAdminModal()" class="px-8 py-3 bg-gradient-to-r from-pink-600 to-cyan-600 rounded-2xl font-bold text-lg">ADMIN PANEL</button>
    </div>
  </nav>

  <div class="pt-32 max-w-4xl mx-auto px-6">
    <h1 class="text-7xl font-black neon-text text-center">TRAFFIC IS EXPLODING</h1>

    <div class="glass rounded-3xl p-10 mt-16">
      <h2 class="text-4xl font-bold text-center mb-6">YOUR VIRAL REFERRAL LINK</h2>
      <div class="flex gap-4">
        <input id="refLink" readonly class="flex-1 bg-zinc-900 border border-cyan-500 rounded-2xl px-8 py-7 text-xl font-mono">
        <button onclick="copyLink()" id="copyBtn" class="px-12 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-2xl">COPY</button>
      </div>
      <div id="linkStatus" class="text-emerald-400 mt-4 text-center">✅ Ready to share</div>
    </div>

    <div class="glass rounded-3xl p-10 mt-12">
      <h2 class="text-4xl font-bold text-center mb-6">TOP REFERRAL LEADERS</h2>
      <div id="leaderboard" class="text-center py-8">Loading leaderboard...</div>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[9999]">
    <div class="glass max-w-md w-full mx-6 rounded-3xl p-10">
      <div class="flex justify-between mb-8">
        <h2 class="text-4xl font-black">ADMIN PANEL</h2>
        <button onclick="hideAdminModal()" class="text-4xl">×</button>
      </div>
      <div id="passwordScreen">
        <input id="adminPass" type="password" placeholder="Enter password" class="w-full bg-zinc-900 border border-pink-500 rounded-2xl px-6 py-5 text-xl mb-6">
        <button onclick="checkAdminPassword()" class="w-full py-5 bg-gradient-to-r from-pink-600 to-purple-600 rounded-2xl text-xl font-bold">UNLOCK</button>
      </div>
      <div id="adminDashboard" class="hidden">
        <input id="newTargetUrl" placeholder="https://your-website.com" class="w-full bg-zinc-900 border border-cyan-500 rounded-2xl px-6 py-5 text-xl mb-6">
        <button onclick="updateTargetWebsite()" class="w-full py-5 bg-emerald-500 text-black font-bold rounded-2xl mb-4">SAVE TARGET URL</button>
        <button onclick="resetAllStats()" class="w-full py-5 bg-red-600 text-white font-bold rounded-2xl">RESET ALL STATS</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://hogrcnwnctzicicxcavv.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ3JjbnduY3R6aWNpY3hjYXZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzYwNTQsImV4cCI6MjA4ODYxMjA1NH0.mUBKJ6-d1QCt3LOYalekGc1n-zOgjG7GeseoBWSAQKQ'
    )
    window.supabase = supabase

    let myCode = localStorage.getItem('myReferralCode')
    if (!myCode) {
      myCode = 'VIRAL-' + Math.random().toString(36).substring(2,10).toUpperCase()
      localStorage.setItem('myReferralCode', myCode)
    }

    function createParticles() {
      const c = document.createElement('canvas')
      c.id = 'particles'
      c.style.position = 'fixed'
      c.style.top = '0'
      c.style.left = '0'
      c.style.zIndex = '-1'
      c.style.pointerEvents = 'none'
      document.body.appendChild(c)
      const ctx = c.getContext('2d')
      c.width = window.innerWidth
      c.height = window.innerHeight
      let particles = []
      class P { constructor() { this.x = Math.random()*c.width; this.y = Math.random()*c.height; this.size = Math.random()*4+1; this.sx = Math.random()*2-1; this.sy = Math.random()*2-1 } update() { this.x += this.sx; this.y += this.sy } draw() { ctx.fillStyle = '#22d3ee'; ctx.fillRect(this.x,this.y,this.size,this.size) } }
      for(let i=0;i<100;i++) particles.push(new P())
      function loop() { ctx.clearRect(0,0,c.width,c.height); particles.forEach(p=>{p.update();p.draw()}); requestAnimationFrame(loop) }
      loop()
    }

    function loadMyLink() {
      document.getElementById('refLink').value = location.origin + '/?ref=' + myCode
    }

    async function loadLeaderboard() {
      try {
        const { data } = await supabase.from('referrers').select('code,visits,referrals').order('visits',{ascending:false}).limit(10)
        let html = data && data.length ? '<table class="w-full"><tr><th>RANK</th><th>CODE</th><th>VISITS</th></tr>' + data.map((r,i) => `<tr><td>#${i+1}</td><td>${r.code}</td><td>${r.visits}</td></tr>`).join('') + '</table>' : 'No data yet'
        document.getElementById('leaderboard').innerHTML = html
      } catch(e) {}
    }

    function showAdminModal() { document.getElementById('adminModal').classList.remove('hidden') }
    function hideAdminModal() { document.getElementById('adminModal').classList.add('hidden') }
    function checkAdminPassword() {
      if (document.getElementById('adminPass').value === 'viral2026$') {
        document.getElementById('passwordScreen').classList.add('hidden')
        document.getElementById('adminDashboard').classList.remove('hidden')
      } else alert('Wrong password')
    }
    function updateTargetWebsite() {
      const u = document.getElementById('newTargetUrl').value.trim()
      if (u) alert('Target saved: ' + u)
    }
    function resetAllStats() {
      if (confirm('Reset all stats?')) alert('Stats reset')
    }
    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('refLink').value)
      const b = document.getElementById('copyBtn')
      const old = b.textContent
      b.textContent = 'COPIED ✓'
      confetti({particleCount:200, spread:70})
      setTimeout(()=> b.textContent = old, 1500)
    }

    window.showAdminModal = showAdminModal
    window.hideAdminModal = hideAdminModal
    window.checkAdminPassword = checkAdminPassword
    window.updateTargetWebsite = updateTargetWebsite
    window.resetAllStats = resetAllStats
    window.copyLink = copyLink
    window.loadLeaderboard = loadLeaderboard

    window.onload = () => {
      createParticles()
      loadMyLink()
      loadLeaderboard()
    }
  </script>
</body>
</html>
